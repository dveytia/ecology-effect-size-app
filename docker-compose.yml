# ============================================================
# docker-compose.yml — Ecology Effect Size Coding Platform
#
# Usage:
#   docker compose build          # build the image (~5-10 min first time)
#   docker compose up -d          # start in background
#   docker compose logs -f shiny  # tail logs
#   docker compose down           # stop
#
# Requires a .env file in the same directory (see .env.example).
# ============================================================

services:
  shiny:
    build:
      context: .
      dockerfile: Dockerfile
    image: ecology-effect-size-app:${APP_IMAGE_TAG:-dev-local}
    container_name: ecology-effect-size-app
    restart: unless-stopped
    ports:
      - "3838:3838"    # change the left side if port 3838 is already in use
    environment:
      # ── Supabase (required) ─────────────────────────────────────────────
      SUPABASE_URL:         ${SUPABASE_URL}
      SUPABASE_KEY:         ${SUPABASE_KEY}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      # ── Google Drive (optional) ──────────────────────────────────────────
      # No OAuth needed — set an API key and share folders as "Anyone with
      # the link can view". If absent, Drive sync is silently disabled.
      GOOGLE_API_KEY:       ${GOOGLE_API_KEY:-}
    volumes:
      # Persist shiny-server logs on the host for inspection / log-shipping
      - ./logs/shiny-server:/var/log/shiny-server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3838/ecology-effect-size-app"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
