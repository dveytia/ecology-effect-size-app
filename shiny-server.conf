# ============================================================
# shiny-server.conf — custom Shiny Server configuration
# Copied into the Docker image at /etc/shiny-server/shiny-server.conf
# ============================================================

run_as shiny;

# Write access log + error log to the volume-mounted directory
access_log /var/log/shiny-server/access.log combined;

server {
  listen 3838;

  location /ecology-effect-size-app {
    app_dir /srv/shiny-server/ecology-effect-size-app;
    log_dir  /var/log/shiny-server;

    # Keep idle sessions alive for 1 hour (3600 s)
    app_idle_timeout 3600;

    # Allow users to see plain error messages in the browser during dev.
    # Set to "on" in production to prevent leaking R stack traces.
    sanitize_errors off;

    # Disable directory listing for the app folder itself
    directory_index off;
  }
}
